[build]
dockerfilePath = "deploy/docker/Dockerfile.unified"

[deploy]
startCommand = "sh -c 'if test ${PORT:-8000} != 8000; then echo Proxying public port 8000 to runtime port ${PORT:-8000}; socat TCP-LISTEN:8000,reuseaddr,fork TCP:127.0.0.1:${PORT:-8000} & fi; echo Starting OpenConstructionERP on port ${PORT:-8000}; exec python -m uvicorn app.main:create_app --factory --host 0.0.0.0 --port ${PORT:-8000} --app-dir /app/backend'"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[variables]
SERVE_FRONTEND = "true"
VECTOR_BACKEND = "lancedb"
