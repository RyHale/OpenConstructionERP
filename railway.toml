[build]
dockerfilePath = "deploy/docker/Dockerfile.unified"

[deploy]
startCommand = "sh -c 'echo Starting OpenConstructionERP on port ${PORT:-8000}; exec python -m uvicorn app.main:create_app --factory --host 0.0.0.0 --port ${PORT:-8000} --app-dir /app/backend'"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[variables]
SERVE_FRONTEND = "true"
VECTOR_BACKEND = "lancedb"
